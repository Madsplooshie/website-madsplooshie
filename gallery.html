<!DOCTYPE html>
<html>

<head>
    <title>Gallery - Madsplooshie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Media/pfp.png">
    <style>
        @font-face {
            font-family: BarlosiusEdged;
            src: url('Fonts/BarlosiusEdged.ttf');
        }

        @font-face {
            font-family: PlainGermanica;
            src: url('Fonts/Plain_Germanica.ttf');
        }

        @font-face {
            font-family: RubikDistressed;
            src: url('Fonts/RubikDistressed-Regular.ttf');
        }

        :root {
            --panel-base: #f0f0ff;
            --panel-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            --text-primary: #493478;
            --text-accent: rgb(0, 128, 145);
            --title-shadow: 2px 2px #7b5d92;
            --footer-bg: rgba(0, 0, 0, 0.9);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(rgba(118, 211, 246, 0.5) 40%, rgba(223, 106, 219, 0.75) 100%), url(Media/static-bg.gif);
            background-color: rgba(0, 0, 0, 0.25);
            background-blend-mode: overlay;
            background-repeat: repeat;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            padding: 0;
        }

        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px, 100%;
            z-index: 20;
            pointer-events: none;
        }

        .banner-wrapper {
            max-width: 1240px;
            margin: 0 auto;
        }

        .banner {
            display: flex;
            max-width: fit-content;
            margin: 0 auto;
            padding: 10px;
            color: white;
            text-align: center;
            text-shadow: var(--title-shadow);
            font-size: 32px;
        }

        .transflag {
            display: block;
            width: 48px;
            height: 32px;
            align-self: center;
            flex: 0 0 auto;
        }

        .headerPadding {
            padding: 0 10px;
        }

        .h1Caps {
            font-family: BarlosiusEdged;
            display: inline;
        }

        .h1Plain {
            font-family: PlainGermanica;
            display: inline;
        }

        .page-wrapper {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            flex: 1;
        }

        .marquee {
            width: 100%;
            max-width: 1200px;
            margin: 10px auto;
            padding: 10px;
            background-color: rgb(24, 24, 24);
            color: white;
        }

        .gallery-panel {
            background-image: url(Media/cells-bg.png);
            background-repeat: repeat;
            background-color: var(--panel-base);
            padding: 10px;
            box-shadow: var(--panel-shadow);
        }

        .gallery-content {
            background-color: #ffffff;
            padding: 20px;
        }

        .gallery-content h1 {
            font-family: RubikDistressed;
            color: var(--text-accent);
            text-align: center;
            margin-top: 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            overflow: hidden;
            border: 2px solid var(--text-primary);
            cursor: pointer;
            background-color: #000;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(73, 52, 120, 0.35);
        }

        .gallery-item .thumb-wrapper {
            aspect-ratio: 1;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-caption {
            background-color: var(--panel-base);
            padding: 6px 8px;
            text-align: center;
            font-size: 13px;
            line-height: 1.3;
        }

        .caption-name {
            color: var(--text-primary);
            font-weight: bold;
        }

        .caption-artist {
            color: var(--text-accent);
            font-size: 12px;
        }

        .caption-artist.redacted {
            background-color: #000;
            color: #000;
            display: inline-block;
            padding: 0 12px;
            border-radius: 2px;
            user-select: none;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 14px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            background-color: var(--text-primary);
            border: 2px solid var(--text-primary);
            font-size: 14px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .back-link:hover {
            background-color: transparent;
            color: var(--text-primary);
        }

        /* Lightbox overlay */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 50;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 3px solid white;
        }

        .footer {
            text-align: center;
            font-size: small;
            padding: 10px;
            background-color: var(--footer-bg);
            color: white;
            margin-top: 10px;
        }

        .footer a {
            color: #73d0ff;
        }

        @media (max-width: 900px) {
            body {
                background-attachment: scroll;
                font-size: 15px;
            }

            .banner {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 12px;
                font-size: 24px;
            }

            .transflag {
                width: 36px;
                height: 24px;
                margin: 0;
            }

            .headerPadding {
                padding: 0;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="crt"></div>

    <div class="banner-wrapper">
        <div class="banner">
            <img class="transflag" src="Media/transflag.gif">
            <div class="headerPadding">
                <h1 class="h1Caps">Madsplooshie</h1>
                <h1 class="h1Plain">'</h1>
                <h1 class="h1Caps">s Brain Dumpster</h1>
            </div>
            <img class="transflag" src="Media/transflag.gif">
        </div>
    </div>

    <div class="marquee">
        <marquee>&#128293; Welcome to my fucked up psychee~ &#128293;</marquee>
    </div>

    <div class="page-wrapper">
        <div class="gallery-panel">
            <div class="gallery-content">
                <a href="index.html" class="back-link">&larr; Back to Home</a>
                <h1>Gallery</h1>

                <div class="gallery-grid" id="gallery-grid">
                    <!-- Images are loaded automatically from Cloudinary -->
                </div>

                <p id="gallery-status" style="text-align: center; color: #999; margin-top: 20px;">
                    <i>Loading gallery...</i>
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Madsplooshie | <a href="mailto:madsplooshie@gmail.com">Contact Me</a>
    </div>

    <!-- Lightbox script -->
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        // =============================================
        // CONFIGURATION - Change these to your values!
        // =============================================
        var CLOUD_NAME = 'df5rotztu';  // Your Cloudinary cloud name
        var TAG_NAME = 'gallery';            // Tag you assign to images in Cloudinary

        // =============================================

        var galleryGrid = document.getElementById('gallery-grid');
        var galleryStatus = document.getElementById('gallery-status');
        var lightbox = document.getElementById('lightbox');
        var lightboxImg = document.getElementById('lightbox-img');

        // Fetch images from Cloudinary's resource list endpoint
        var listUrl = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/list/' + TAG_NAME + '.json';

        fetch(listUrl)
            .then(function (response) {
                if (!response.ok) {
                    throw new Error('Could not load gallery (status ' + response.status + ')');
                }
                return response.json();
            })
            .then(function (data) {
                if (!data.resources || data.resources.length === 0) {
                    galleryStatus.innerHTML = '<i>No pictures yet — check back soon!</i>';
                    return;
                }

                // Sort newest first (by created_at or version)
                data.resources.sort(function (a, b) {
                    return (b.version || 0) - (a.version || 0);
                });

                data.resources.forEach(function (img) {
                    var publicId = img.public_id;
                    var format = img.format || 'jpg';

                    // Parse "Name - BySomeone" from the filename
                    var filename = publicId.split('/').pop();
                    var artName = filename;
                    var artArtist = '';
                    var dashIndex = filename.indexOf(' - ');
                    if (dashIndex !== -1) {
                        artName = filename.substring(0, dashIndex).trim();
                        artArtist = filename.substring(dashIndex + 3).trim();
                    }

                    // Thumbnail (400px wide, auto-cropped)
                    var thumbUrl = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/upload/c_fill,w_400,h_400,q_auto,f_auto/' + publicId + '.' + format;
                    // Full size (max 1600px, auto quality)
                    var fullUrl = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/upload/c_limit,w_1600,q_auto,f_auto/' + publicId + '.' + format;

                    var item = document.createElement('div');
                    item.className = 'gallery-item';

                    var thumbWrapper = document.createElement('div');
                    thumbWrapper.className = 'thumb-wrapper';

                    var image = document.createElement('img');
                    image.src = thumbUrl;
                    image.alt = artName;
                    image.loading = 'lazy';
                    image.dataset.full = fullUrl;

                    image.addEventListener('click', function () {
                        lightboxImg.src = this.dataset.full;
                        lightboxImg.alt = this.alt;
                        lightbox.classList.add('active');
                    });

                    thumbWrapper.appendChild(image);
                    item.appendChild(thumbWrapper);

                    // Caption below the image
                    var caption = document.createElement('div');
                    caption.className = 'gallery-caption';
                    var nameSpan = document.createElement('div');
                    nameSpan.className = 'caption-name';
                    nameSpan.textContent = artName;
                    caption.appendChild(nameSpan);
                    if (artArtist) {
                        var artistSpan = document.createElement('div');
                        artistSpan.className = 'caption-artist';
                        if (artArtist.toUpperCase() === 'REDACTED') {
                            artistSpan.classList.add('redacted');
                            artistSpan.textContent = '\u2588\u2588\u2588\u2588\u2588\u2588';
                        } else {
                            artistSpan.textContent = artArtist;
                        }
                        caption.appendChild(artistSpan);
                    }
                    item.appendChild(caption);

                    galleryGrid.appendChild(item);
                });

                galleryStatus.style.display = 'none';
            })
            .catch(function (err) {
                galleryStatus.innerHTML = '<i>Could not load gallery. Please try again later.</i>';
            });

        // Close lightbox on click
        lightbox.addEventListener('click', function () {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
        });
    </script>
</body>

</html>
